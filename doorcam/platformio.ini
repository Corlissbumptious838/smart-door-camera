; ===========================================================================
;  Türkamera — AI-Thinker ESP32-CAM
;  AP+STA: permanenter Hotspot "DoorCam-Setup" + eigenes Web-Portal
;  (Vorschau / WLAN / Sicherheit) + mDNS + MJPEG-Stream auf Port 81
;  WebServer + DNSServer sind im Arduino-ESP32-Core enthalten.
; ===========================================================================

[env:doorcam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200

; Kamera + WebServer ist groß -> große App-Partition ohne OTA
board_build.partitions = huge_app.csv

build_flags =
    -DCORE_DEBUG_LEVEL=2
