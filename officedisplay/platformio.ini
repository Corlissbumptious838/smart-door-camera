; ===========================================================================
;  Büro-Display — ESP32-S3 + rundes GC9A01-TFT (240x240, SPI)
;  WiFiManager (Captive Portal + Kamera-URL-Feld) + TFT_eSPI + TJpg_Decoder
;
;  HINWEIS: Dieses Board hängt über einen FTDI FT232R (USB-UART-Bridge) am USB,
;  nicht über nativen USB. Daher:
;    - serieller Port heißt /dev/cu.usbserial-* (nicht usbmodem)
;    - Serial läuft über UART0 -> CDC_ON_BOOT=0
;    - boot-sichere Flash-/PSRAM-Einstellung (echter Board-Typ unbekannt)
; ===========================================================================

[env:officedisplay]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; Fester Port dieses Boards (FTDI-Serial A5069RR4) — verhindert Verwechslung
; mit dem ebenfalls als usbserial-* erscheinenden Kamera-Adapter.
upload_port = /dev/cu.usbserial-A5069RR4
monitor_port = /dev/cu.usbserial-A5069RR4

; Boot-sicher: Quad/Standard-Modus, kein erzwungenes Octal-PSRAM, keine feste
; 16-MB-Partition (echter Flash-/PSRAM-Typ des FTDI-Boards ist unbekannt).
; Das Display benötigt kein PSRAM (32-KB-JPEG-Puffer passt in den internen RAM).
board_build.arduino.memory_type = qio_qspi

; WebServer + DNSServer sind im Arduino-ESP32-Core enthalten (kein lib_dep nötig).
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    bodmer/TJpg_Decoder @ ^1.1.0

build_flags =
    ; --- Serial über UART0 -> FTDI-Bridge (nicht nativer USB-CDC) ---
    -DARDUINO_USB_CDC_ON_BOOT=0

    ; --- TFT_eSPI vollständig per Build-Flags konfigurieren (GC9A01) ---
    ; ESP32-S3 braucht eine dedizierte SPI-Instanz, sonst Crash (StoreProhibited)
    ; in begin_tft_write beim ersten tft.init().
    -DUSE_HSPI_PORT=1
    -DUSER_SETUP_LOADED=1
    -DGC9A01_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=13
    -DTFT_RST=14
    -DTFT_BL=-1
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DSPI_FREQUENCY=40000000
